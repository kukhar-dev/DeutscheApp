name: Remote SSH Deploy

# Запуск при кожному пуші в гілку main
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Дізнаємось IP-адресу ранера GitHub
    - name: Get Github Runner IP
      run: curl icanhazip.com

    # 2. Підключаємось до сервера Cityhost
    - name: Deploy commands over SSH
      uses: appleboy/ssh-action@master
      with:
        host: 'rav4.cityhost.com.ua'
        username: 'ch07327580'
        password: ${{ secrets.SSH_PASSWORD }}
        port: 22
        script: |
          cd www/deutscheapp.turbosoft.com.ua
          git fetch --all
          git reset --hard origin/main
